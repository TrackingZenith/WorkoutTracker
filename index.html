<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(90vw, 500px);
      background: #1d1d1d;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Workout Tracker</h1>
    <p>Add a workout note:</p>
    <input id="noteInput" placeholder="ex: Push A - Smith incline 155 x 8, 7, 6" />
    <button onclick="addNote()">Save</button>
    <ul id="notes"></ul>
  </div>

  <script>
    const notesEl = document.getElementById("notes");
    const inputEl = document.getElementById("noteInput");

    function loadNotes() {
      const notes = JSON.parse(localStorage.getItem("notes") || "[]");
      notesEl.innerHTML = "";
      notes.forEach(note => {
        const li = document.createElement("li");
        li.textContent = note;
        notesEl.appendChild(li);
      });
    }

    function addNote() {
      const value = inputEl.value.trim();
      if (!value) return;
      const notes = JSON.parse(localStorage.getItem("notes") || "[]");
      notes.push(value);
      localStorage.setItem("notes", JSON.stringify(notes));
      inputEl.value = "";
      loadNotes();
    }

    loadNotes();
  </script>
</body>
</html>
